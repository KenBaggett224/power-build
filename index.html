<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>Athletic Power Building</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --card: #16161f;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #8888a0;
    --red: #ff3a5c;
    --red-dim: #ff3a5c30;
    --blue: #3a7bff;
    --blue-dim: #3a7bff30;
    --green: #22c55e;
    --green-dim: #22c55e25;
    --orange: #ff8a2b;
    --orange-dim: #ff8a2b30;
    --purple: #a855f7;
    --purple-dim: #a855f730;
    --yellow: #eab308;
    --mon: var(--red);
    --tue: var(--blue);
    --wed: var(--green);
    --thu: var(--orange);
    --fri: var(--purple);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── TOP BAR ─────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .topbar h1 {
    font-size: 16px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--red), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── USER TABS ───────────────────────────── */
  .user-tabs {
    display: flex; gap: 6px;
  }
  .user-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.2s;
  }
  .user-tab.active {
    background: var(--red); border-color: var(--red); color: #fff;
  }

  /* ── WEEK SELECTOR ───────────────────────── */
  .week-selector {
    display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .week-btn {
    flex-shrink: 0; padding: 10px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
    cursor: pointer; transition: all 0.2s;
  }
  .week-btn.active {
    background: var(--bg3); border-color: var(--text); color: var(--text);
  }

  /* ── DAY SELECTOR ────────────────────────── */
  .day-selector {
    display: flex; gap: 4px; padding: 6px 16px 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .day-btn {
    flex-shrink: 0; padding: 8px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .day-btn.active { color: #fff; }
  .day-btn[data-day="Monday"].active { background: var(--red-dim); border-color: var(--mon); color: var(--mon); }
  .day-btn[data-day="Tuesday"].active { background: var(--blue-dim); border-color: var(--tue); color: var(--tue); }
  .day-btn[data-day="Wednesday"].active { background: var(--green-dim); border-color: var(--wed); color: var(--wed); }
  .day-btn[data-day="Thursday"].active { background: var(--orange-dim); border-color: var(--thu); color: var(--thu); }
  .day-btn[data-day="Friday"].active { background: var(--purple-dim); border-color: var(--fri); color: var(--fri); }

  .day-btn .done-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    position: absolute; top: 4px; right: 4px; display: none;
  }
  .day-btn.completed .done-dot { display: block; }

  /* ── DAY HEADER ──────────────────────────── */
  .day-header {
    padding: 14px 16px; margin: 0 16px; border-radius: 10px;
    margin-bottom: 10px;
  }
  .day-header h2 { font-size: 18px; font-weight: 800; color: #fff; text-transform: uppercase; }
  .day-header p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; font-weight: 300; }
  .day-header.Monday { background: linear-gradient(135deg, #ff3a5c20, #ff3a5c08); border: 1px solid #ff3a5c40; }
  .day-header.Tuesday { background: linear-gradient(135deg, #3a7bff20, #3a7bff08); border: 1px solid #3a7bff40; }
  .day-header.Wednesday { background: linear-gradient(135deg, #22c55e20, #22c55e08); border: 1px solid #22c55e40; }
  .day-header.Thursday { background: linear-gradient(135deg, #ff8a2b20, #ff8a2b08); border: 1px solid #ff8a2b40; }
  .day-header.Friday { background: linear-gradient(135deg, #a855f720, #a855f708); border: 1px solid #a855f740; }

  /* ── PROGRESS BAR ────────────────────────── */
  .progress-wrap {
    padding: 0 16px 12px; display: flex; align-items: center; gap: 10px;
  }
  .progress-bar {
    flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease;
  }
  .progress-text { font-size: 12px; font-weight: 700; color: var(--green); min-width: 36px; text-align: right; }

  /* ── EXERCISE CARDS ──────────────────────── */
  .exercises { padding: 0 12px 20px; }

  .ex-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .ex-card.checked { border-color: var(--green); }
  .ex-card.checked .ex-header { opacity: 0.6; }

  .ex-header {
    display: flex; align-items: flex-start; gap: 10px; padding: 14px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .ex-check {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; margin-top: 1px;
  }
  .ex-check.done { background: var(--green); border-color: var(--green); }
  .ex-check.done::after { content: '✓'; color: #fff; font-size: 15px; font-weight: 700; }

  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .ex-sets { font-size: 12px; font-weight: 600; color: var(--blue); margin-top: 2px; }

  .ex-toggle {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
    border: none; background: var(--bg3); color: var(--text2);
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .ex-toggle.open { transform: rotate(180deg); }

  .ex-details {
    display: none; padding: 0 14px 14px; border-top: 1px solid var(--border);
  }
  .ex-details.show { display: block; }

  .ex-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-top: 10px; }
  .ex-tip { font-size: 11px; color: var(--text2); line-height: 1.5; margin-top: 8px; font-style: italic; }
  .ex-tip b { color: var(--yellow); font-style: normal; }
  .ex-wt { font-size: 11px; color: var(--red); line-height: 1.5; margin-top: 4px; font-weight: 600; }

  /* ── INPUT FIELDS ────────────────────────── */
  .input-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .input-group {
    flex: 1;
  }
  .input-group label {
    display: block; font-size: 10px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .input-group input, .input-group textarea {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px;
    font-family: 'JetBrains Mono', monospace; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group textarea:focus {
    border-color: var(--blue);
  }
  .input-group input::placeholder, .input-group textarea::placeholder {
    color: var(--text2); opacity: 0.5;
  }
  .input-group textarea {
    resize: none; height: 44px; font-size: 12px; font-family: 'Outfit', sans-serif;
  }
  .notes-group { margin-top: 8px; }

  /* ── SUMMARY SECTION ─────────────────────── */
  .summary-section {
    padding: 16px; margin: 0 12px 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .summary-section h3 {
    font-size: 14px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .stat-box {
    background: var(--bg2); border-radius: 8px; padding: 12px; text-align: center;
  }
  .stat-num { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .log-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
  .log-table th {
    font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.5px; padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .log-table td {
    font-size: 12px; padding: 7px 6px; border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  .log-table td:first-child { font-family: 'Outfit', sans-serif; font-weight: 600; }
  .log-table .completed-row td { color: var(--green); }
  .log-table .pending-row td { color: var(--text2); }

  /* ── ACTIONS ─────────────────────────────── */
  .actions-bar {
    padding: 12px 16px 32px; display: flex; gap: 8px;
  }
  .act-btn {
    flex: 1; padding: 14px; border-radius: 10px; font-size: 13px; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s;
  }
  .act-btn:active { transform: scale(0.97); }
  .act-btn.danger { border-color: #ff3a5c40; color: var(--red); }

  /* ── MISC ────────────────────────────────── */
  .spacer { height: 80px; }
  .hidden { display: none !important; }

  @media (max-width: 380px) {
    .day-btn { padding: 7px 10px; font-size: 11px; }
    .ex-name { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Power Build</h1>
  <div class="user-tabs">
    <button class="user-tab active" data-user="ken" onclick="switchUser('ken')">Ken</button>
    <button class="user-tab" data-user="hayden" onclick="switchUser('hayden')">Hayden</button>
  </div>
</div>

<div class="week-selector" id="weekSelector"></div>
<div class="day-selector" id="daySelector"></div>

<div id="dayHeaderWrap"></div>
<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0/6</div>
</div>

<div class="exercises" id="exerciseList"></div>

<div id="summaryWrap"></div>

<div class="actions-bar">
  <button class="act-btn" onclick="exportData()">Export Log</button>
  <button class="act-btn danger" onclick="resetCurrentDay()">Reset Day</button>
</div>

<div class="spacer"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// WORKOUT DATA
// ═══════════════════════════════════════════════════════════════
const PROGRAM = {
"Week 1": {
"Monday": { focus: "Chest & Triceps — Foundation Strength", exercises: [
  {name:"Flat Barbell Bench Press",sets:"4 x 6-8",desc:"Lie flat on bench, grip bar slightly wider than shoulder-width. Lower bar to mid-chest, press up explosively to lockout.",tip:"Plant feet flat, squeeze glutes, keep a slight arch in your lower back. Drive through the floor with your legs on every rep. Don't bounce the bar off your chest.",wt:"At 180-200 lb, start around 155-185 lb. Choose a weight where rep 6 is hard and rep 8 is near failure."},
  {name:"Incline Dumbbell Press",sets:"3 x 8-10",desc:"Set bench to 30-degree incline. Press dumbbells from chest level to full lockout, squeezing at the top.",tip:"Keep elbows at a 45-degree angle, not flared out at 90. Bring the dumbbells together at the top for a peak contraction.",wt:"Start with 55-70 lb dumbbells. You should struggle on reps 9-10."},
  {name:"Cable Crossover Flyes",sets:"3 x 12-15",desc:"Set cables to high position. Step forward, bring handles together in a hugging arc motion in front of your chest.",tip:"Keep a slight bend in your elbows — this is not a pressing motion. Squeeze and hold at the bottom for 1 second.",wt:"Light-moderate. 20-35 lb per side. Focus on the squeeze, not the weight."},
  {name:"Close-Grip Bench Press",sets:"3 x 8-10",desc:"Same bench setup, but grip the bar shoulder-width or slightly narrower. Lower to lower chest, press up.",tip:"Keep elbows tucked tight to your body. This shifts load from chest to triceps. Don't go too narrow — shoulder-width is plenty.",wt:"Start around 60-70% of your flat bench. If you bench 185, use about 115-135 lb."},
  {name:"Overhead Tricep Cable Extension",sets:"3 x 12-15",desc:"Face away from cable, rope attachment overhead. Extend arms forward and up, locking out at full extension.",tip:"Don't let your elbows flare — keep them pointed forward and tight. The stretch at the bottom is where the magic happens.",wt:"30-50 lb. Full range of motion matters more than heavy weight here."},
  {name:"Explosive Medicine Ball Chest Pass",sets:"3 x 10",desc:"Stand facing a wall, hold med ball at chest. Explosively push the ball into the wall, catch and repeat rapidly.",tip:"This is your athletic finisher — focus on max velocity, not endurance. Stay on the balls of your feet.",wt:"10-15 lb med ball. Speed is the goal, not load."},
]},
"Tuesday": { focus: "Back & Biceps — Width & Thickness", exercises: [
  {name:"Barbell Bent-Over Row",sets:"4 x 6-8",desc:"Hinge at hips to 45 degrees, pull barbell from hang to your lower chest/upper abdomen.",tip:"Keep your back flat — if you're rounding, the weight is too heavy. Think about driving your elbows behind you.",wt:"Start around 135-165 lb. Form is king."},
  {name:"Lat Pulldown (Wide Grip)",sets:"3 x 8-10",desc:"Grip the bar wide, lean back slightly, pull to upper chest. Squeeze shoulder blades together at the bottom.",tip:"Don't pull behind the neck. Initiate the pull by depressing your shoulder blades first, then bend the elbows.",wt:"120-160 lb. If you can't control the negative for 2 seconds, go lighter."},
  {name:"Seated Cable Row (V-Bar)",sets:"3 x 10-12",desc:"Sit upright, pull V-bar handle to your lower chest. Let your shoulders stretch forward on the return.",tip:"Don't lean way back — a slight rock is fine. Pause and squeeze for 1 second at your chest on every rep.",wt:"130-170 lb. Moderate and controlled."},
  {name:"Barbell Curl (Straight Bar)",sets:"3 x 8-10",desc:"Stand upright, curl the barbell from full arm extension to shoulder height. Lower under control.",tip:"Pin your elbows at your sides — they shouldn't drift forward. If you're swinging, drop the weight.",wt:"65-85 lb. Ego is the enemy on curls."},
  {name:"Incline Dumbbell Curl",sets:"3 x 10-12",desc:"Sit on a 45-degree incline, let arms hang straight down. Curl dumbbells up, supinating your wrists at the top.",tip:"The incline stretches the long head of the bicep — that's the peak. Don't rush the negative.",wt:"25-35 lb dumbbells."},
  {name:"Explosive Band Pull-Aparts",sets:"3 x 15",desc:"Hold a resistance band at chest height, arms extended. Pull apart explosively, squeezing rear delts.",tip:"Athletic finisher for shoulder health and posture. Snap the band apart fast, control it back slow.",wt:"Medium resistance band. Focus on speed and contraction."},
]},
"Wednesday": { focus: "Legs & Core — Power Foundation", exercises: [
  {name:"Barbell Back Squat",sets:"4 x 6-8",desc:"Bar on upper traps, feet shoulder-width, sit back and down to parallel or just below. Drive up through your heels.",tip:"Brace your core hard before every rep. Knees should track over your toes, not cave inward. Own the bottom position.",wt:"Start around 185-225 lb. Working toward 1.5x BW squat is a great target."},
  {name:"Romanian Deadlift (Barbell)",sets:"3 x 8-10",desc:"Hold barbell at hips, push hips back while keeping legs nearly straight. Lower until deep hamstring stretch.",tip:"The bar should stay in contact with your legs. Think about pushing your butt to the wall behind you.",wt:"135-185 lb. If you feel it in your lower back, lighten the weight."},
  {name:"Leg Press",sets:"3 x 10-12",desc:"Sit in leg press machine, feet shoulder-width. Lower sled until knees hit 90 degrees, press back up.",tip:"Don't lock out your knees at the top. Feet higher = more glutes/hams, lower = more quads.",wt:"270-360 lb. You can push heavier here since the machine stabilizes."},
  {name:"Walking Lunges (Dumbbells)",sets:"3 x 12 each leg",desc:"Hold dumbbells at sides, step forward into a lunge, drive through the front heel to step into the next.",tip:"Keep your torso upright. Back knee should nearly kiss the floor. Builds single-leg power for athletics.",wt:"40-55 lb dumbbells. These get brutal fast."},
  {name:"Hanging Leg Raise",sets:"3 x 12-15",desc:"Hang from a pull-up bar, raise your legs to 90 degrees or higher. Lower under control without swinging.",tip:"Slightly round your pelvis at the top — that's what engages the lower abs. Bend knees if needed.",wt:"Bodyweight. Add a dumbbell between your feet when 15 reps is easy."},
  {name:"Box Jumps",sets:"4 x 5",desc:"Stand facing a plyo box, dip into a quarter squat and explode upward, landing softly on the box. Step down.",tip:"Reset completely between each jump. Step down, don't jump down. Focus on height and a quiet landing.",wt:"Bodyweight. Start with a 20-24 inch box and progress height."},
]},
"Thursday": { focus: "Shoulders & Arms — Athletic Upper Body", exercises: [
  {name:"Standing Barbell Overhead Press",sets:"4 x 6-8",desc:"Unrack bar at collarbone, press straight overhead to full lockout. Lower back to shoulders under control.",tip:"Squeeze your glutes and brace your core — this is a full-body lift. Push your head through at the top.",wt:"95-115 lb. Most guys can only press about 60% of their bench."},
  {name:"Dumbbell Lateral Raise",sets:"3 x 12-15",desc:"Stand with dumbbells at sides. Raise arms out to the sides until parallel with the floor, lower slowly.",tip:"Lead with your elbows, not your hands. Think about pouring water from a pitcher at the top.",wt:"15-25 lb. If you're shrugging to get them up, drop the weight."},
  {name:"Face Pulls (Cable)",sets:"3 x 15",desc:"Set cable at face height with rope. Pull toward your face, separating rope ends past your ears. Squeeze rear delts.",tip:"The most underrated exercise in the gym. Keep elbows high and pull apart as you pull back.",wt:"30-50 lb. Light and controlled."},
  {name:"EZ-Bar Curl",sets:"3 x 10-12",desc:"Grip the EZ bar on the inner angles. Curl from full extension to full contraction. Lower under control.",tip:"The angled grip reduces wrist strain. Keep elbows pinned.",wt:"55-75 lb. Moderate and strict."},
  {name:"Tricep Dips (Weighted)",sets:"3 x 8-10",desc:"Use parallel dip bars. Lower until upper arms are parallel to the floor, press back up to lockout.",tip:"Lean forward for chest, stay upright for triceps. Don't go too deep — parallel protects your shoulders.",wt:"Bodyweight to start. Add 10-25 lb once BW for 10 is easy."},
  {name:"Plyo Push-Ups",sets:"3 x 8",desc:"Perform a push-up but explode off the ground at the top, getting your hands airborne. Land softly and repeat.",tip:"Athletic power finisher. Full extension — try to get maximum air. Keep core tight on landing.",wt:"Bodyweight only. Power and speed, not endurance."},
]},
"Friday": { focus: "Athletic Cardio & Conditioning", exercises: [
  {name:"Treadmill Sprint Intervals",sets:"8 x 30s sprint / 60s walk",desc:"Set treadmill to 10-12 mph for sprints. Walk at 3.5 mph for recovery. Complete 8 rounds.",tip:"Start at a speed you can sustain for all 8 rounds. You can bump it up next week.",wt:"No added weight. If treadmill feels unsafe, use a track."},
  {name:"Kettlebell Swings",sets:"4 x 20",desc:"Hinge at hips, swing kettlebell between legs, then snap hips forward to drive bell to chest height.",tip:"This is a hip hinge, not a squat. Squeeze your glutes at the top. The power comes from your hips.",wt:"35-53 lb kettlebell."},
  {name:"Battle Ropes — Alternating Waves",sets:"4 x 30s on / 30s off",desc:"Grip one rope end in each hand, alternate slamming each arm up and down to create waves.",tip:"Stay low in an athletic stance — bent knees, hips back. Keep your core tight and breathe rhythmically.",wt:"Use whatever ropes are available."},
  {name:"Agility Ladder Drills",sets:"5 min continuous",desc:"Run through various patterns: icky shuffle, in-in-out-out, lateral runs, and crossover steps.",tip:"Foot speed over everything — stay on the balls of your feet. Keep head up, pump arms.",wt:"Bodyweight. Pure athletic conditioning."},
  {name:"Sled Push (or Prowler)",sets:"4 x 40 yards",desc:"Load a sled, grip high handles, drive it forward by extending hips and knees with each step.",tip:"Keep body at a 45-degree angle — arms locked, drive through legs. Short, choppy steps.",wt:"90-135 lb on the sled. Maintain speed for the full 40 yards."},
  {name:"Core Finisher — Plank to Push-Up",sets:"3 x 10 each arm",desc:"Start in forearm plank. Push up to full push-up position one arm at a time, then lower back down.",tip:"Fight the rotation — hips stay square to the floor. Go slow and controlled.",wt:"Bodyweight. Add a weight vest when 10 per arm gets easy."},
]},
},
"Week 2": {
"Monday": { focus: "Chest & Triceps — Dumbbell Dominant", exercises: [
  {name:"Flat Dumbbell Press",sets:"4 x 8-10",desc:"Lie flat on bench with a dumbbell in each hand. Press from chest level to full lockout.",tip:"Dumbbells allow a deeper stretch. Rotate pinkies slightly inward at the top for a better chest squeeze.",wt:"65-85 lb dumbbells."},
  {name:"Decline Barbell Press",sets:"3 x 8-10",desc:"Set bench to a slight decline. Unrack bar, lower to lower chest, press up.",tip:"Decline targets the lower chest. Use a spotter or set the safety pins.",wt:"155-195 lb. Most people are stronger on decline than flat."},
  {name:"Machine Pec Deck Fly",sets:"3 x 12-15",desc:"Sit in the pec deck, place forearms against pads. Bring pads together, squeeze, return.",tip:"Machine keeps constant tension. Don't let pads go too far back. Hold squeeze for 2 seconds.",wt:"100-140 lb. Moderate."},
  {name:"Tricep Rope Pushdown",sets:"3 x 12-15",desc:"Attach rope to high cable. Push down until arms fully extended, spreading rope apart at bottom.",tip:"Keep elbows locked at your sides. Splitting the rope hits the lateral head hard.",wt:"40-60 lb. Isolation — feel every rep."},
  {name:"Skull Crushers (EZ Bar)",sets:"3 x 10-12",desc:"Lie flat, hold EZ bar above chest. Bend at elbows to lower bar toward forehead, extend back up.",tip:"Lower to forehead or just past — not to your nose. Keep elbows pointed straight up.",wt:"50-70 lb. Moderate and controlled."},
  {name:"Explosive Clap Push-Ups",sets:"3 x 8",desc:"Standard push-up but explode off the floor, clap hands mid-air, land softly.",tip:"Full lockout explosion. If too advanced, start with plyo push-ups where hands just leave the ground.",wt:"Bodyweight. Speed and power — rest fully between sets."},

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentUser = 'ken';
let currentWeek = 'Week 1';
let currentDay = 'Monday';

function storageKey(user, week, day, exIdx, field) {
  return `apb_${user}_${week}_${day}_${exIdx}_${field}`;
}

function getData(exIdx, field) {
  return localStorage.getItem(storageKey(currentUser, currentWeek, currentDay, exIdx, field)) || '';
}

function setData(exIdx, field, value) {
  const key = storageKey(currentUser, currentWeek, currentDay, exIdx, field);
  if (value) localStorage.setItem(key, value);
  else localStorage.removeItem(key);
}

function isExDone(user, week, day, exIdx) {
  return localStorage.getItem(storageKey(user, week, day, exIdx, 'done')) === '1';
}

function isDayCompleted(user, week, day) {
  const exs = PROGRAM[week]?.[day]?.exercises;
  if (!exs) return false;
  return exs.every((_, i) => isExDone(user, week, day, i));
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function switchUser(user) {
  currentUser = user;
  document.querySelectorAll('.user-tab').forEach(t => t.classList.toggle('active', t.dataset.user === user));
  renderAll();
}

function selectWeek(week) {
  currentWeek = week;
  currentDay = 'Monday';
  renderAll();
}

function selectDay(day) {
  currentDay = day;
  renderDayContent();
}

function renderAll() {
  renderWeekSelector();
  renderDaySelector();
  renderDayContent();
}

function renderWeekSelector() {
  const el = document.getElementById('weekSelector');
  el.innerHTML = '';
  ['Week 1','Week 2','Week 3','Week 4'].forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (w === currentWeek ? ' active' : '');
    btn.textContent = w.toUpperCase();
    btn.onclick = () => selectWeek(w);
    el.appendChild(btn);
  });
}

function renderDaySelector() {
  const el = document.getElementById('daySelector');
  el.innerHTML = '';
  ['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === currentDay ? ' active' : '');
    btn.dataset.day = d;
    const completed = isDayCompleted(currentUser, currentWeek, d);
    if (completed) btn.classList.add('completed');
    const dot = document.createElement('span');
    dot.className = 'done-dot';
    btn.appendChild(dot);
    const labels = {Monday:'MON',Tuesday:'TUE',Wednesday:'WED',Thursday:'THU',Friday:'FRI'};
    btn.appendChild(document.createTextNode(labels[d]));
    btn.onclick = () => selectDay(d);
    el.appendChild(btn);
  });
}

function renderDayContent() {
  const dayData = PROGRAM[currentWeek]?.[currentDay];
  if (!dayData) return;

  // Day header
  const hdr = document.getElementById('dayHeaderWrap');
  hdr.innerHTML = `<div class="day-header ${currentDay}">
    <h2>${currentDay}</h2>
    <p>${dayData.focus}</p>
  </div>`;

  // Exercises
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  const exercises = dayData.exercises;

  exercises.forEach((ex, i) => {
    const done = getData(i, 'done') === '1';
    const card = document.createElement('div');
    card.className = 'ex-card' + (done ? ' checked' : '');
    card.id = `ex-card-${i}`;

    card.innerHTML = `
      <div class="ex-header" onclick="toggleDetails(${i})">
        <div class="ex-check ${done ? 'done' : ''}" id="check-${i}" onclick="event.stopPropagation(); toggleDone(${i})"></div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets">${ex.sets}</div>
        </div>
        <button class="ex-toggle" id="toggle-${i}">▼</button>
      </div>
      <div class="ex-details" id="details-${i}">
        <div class="ex-desc">${ex.desc}</div>
        <div class="ex-tip"><b>Pro Tip:</b> ${ex.tip}</div>
        <div class="ex-wt">Weight: ${ex.wt}</div>
        <div class="input-row">
          <div class="input-group">
            <label>Weight Used</label>
            <input type="text" inputmode="numeric" placeholder="lbs"
              id="wt-${i}" value="${getData(i,'weight')}"
              onchange="setData(${i},'weight',this.value)">
          </div>
          <div class="input-group">
            <label>Reps Done</label>
            <input type="text" inputmode="text" placeholder="e.g. 8,8,7,6"
              id="reps-${i}" value="${getData(i,'reps')}"
              onchange="setData(${i},'reps',this.value)">
          </div>
        </div>
        <div class="input-group notes-group">
          <label>Notes</label>
          <textarea placeholder="How'd it feel?"
            id="notes-${i}" onchange="setData(${i},'notes',this.value)">${getData(i,'notes')}</textarea>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  updateProgress();
  renderSummary();
  renderDaySelector(); // update green dots
}

function toggleDone(idx) {
  const cur = getData(idx, 'done');
  setData(idx, 'done', cur === '1' ? '' : '1');
  const done = getData(idx, 'done') === '1';

  const check = document.getElementById(`check-${idx}`);
  const card = document.getElementById(`ex-card-${idx}`);
  check.classList.toggle('done', done);
  card.classList.toggle('checked', done);

  updateProgress();
  renderSummary();
  renderDaySelector();
}

function toggleDetails(idx) {
  const det = document.getElementById(`details-${idx}`);
  const tog = document.getElementById(`toggle-${idx}`);
  det.classList.toggle('show');
  tog.classList.toggle('open');
}

function updateProgress() {
  const exs = PROGRAM[currentWeek]?.[currentDay]?.exercises || [];
  let done = 0;
  exs.forEach((_, i) => { if (getData(i, 'done') === '1') done++; });
  const pct = exs.length ? Math.round(done / exs.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done}/${exs.length}`;
}

function renderSummary() {
  const wrap = document.getElementById('summaryWrap');
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  let totalEx = 0, totalDone = 0;
  const dayLogs = [];

  days.forEach(d => {
    const exs = PROGRAM[currentWeek]?.[d]?.exercises || [];
    let dayDone = 0;
    exs.forEach((ex, i) => {
      totalEx++;
      if (isExDone(currentUser, currentWeek, d, i)) { totalDone++; dayDone++; }
    });
    dayLogs.push({ day: d, total: exs.length, done: dayDone });
  });

  const pct = totalEx ? Math.round(totalDone / totalEx * 100) : 0;

  // Build logged exercises table for current day
  const currentExs = PROGRAM[currentWeek]?.[currentDay]?.exercises || [];
  let logRows = '';
  currentExs.forEach((ex, i) => {
    const done = isExDone(currentUser, currentWeek, currentDay, i);
    const w = localStorage.getItem(storageKey(currentUser, currentWeek, currentDay, i, 'weight')) || '—';
    const r = localStorage.getItem(storageKey(currentUser, currentWeek, currentDay, i, 'reps')) || '—';
    const cls = done ? 'completed-row' : 'pending-row';
    logRows += `<tr class="${cls}"><td>${ex.name}</td><td>${w}</td><td>${r}</td></tr>`;
  });

  wrap.innerHTML = `
    <div class="summary-section">
      <h3>${currentUser === 'ken' ? 'Ken' : 'Hayden'}'s ${currentWeek} Summary</h3>
      <div class="summary-grid">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${totalDone}</div><div class="stat-label">Exercises Done</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--blue)">${totalEx - totalDone}</div><div class="stat-label">Remaining</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--orange)">${pct}%</div><div class="stat-label">Week Complete</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--purple)">${dayLogs.filter(d=>d.done===d.total).length}/5</div><div class="stat-label">Days Done</div></div>
      </div>
      ${logRows ? `<table class="log-table">
        <tr><th>Exercise</th><th>Weight</th><th>Reps</th></tr>
        ${logRows}
      </table>` : ''}
    </div>
  `;
}

function resetCurrentDay() {
  if (!confirm(`Reset all ${currentDay} data for ${currentUser === 'ken' ? 'Ken' : 'Hayden'}?`)) return;
  const exs = PROGRAM[currentWeek]?.[currentDay]?.exercises || [];
  exs.forEach((_, i) => {
    ['done','weight','reps','notes'].forEach(f => {
      localStorage.removeItem(storageKey(currentUser, currentWeek, currentDay, i, f));
    });
  });
  renderDayContent();
}

function exportData() {
  let output = `ATHLETIC POWER BUILDING LOG\n${currentUser === 'ken' ? 'Ken' : 'Hayden'}\n${'='.repeat(40)}\n\n`;
  ['Week 1','Week 2','Week 3','Week 4'].forEach(w => {
    output += `\n${w.toUpperCase()}\n${'-'.repeat(30)}\n`;
    ['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(d => {
      const exs = PROGRAM[w]?.[d]?.exercises || [];
      let hasData = false;
      let dayStr = `\n  ${d} — ${PROGRAM[w][d].focus}\n`;
      exs.forEach((ex, i) => {
        const wt = localStorage.getItem(storageKey(currentUser, w, d, i, 'weight'));
        const reps = localStorage.getItem(storageKey(currentUser, w, d, i, 'reps'));
        const notes = localStorage.getItem(storageKey(currentUser, w, d, i, 'notes'));
        const done = localStorage.getItem(storageKey(currentUser, w, d, i, 'done'));
        if (wt || reps || notes || done) {
          hasData = true;
          dayStr += `    ${done === '1' ? '✓' : '○'} ${ex.name}: ${wt || '—'} lbs, ${reps || '—'} reps${notes ? ' | ' + notes : ''}\n`;
        }
      });
      if (hasData) output += dayStr;
    });
  });

  const blob = new Blob([output], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `workout_log_${currentUser}.txt`;
  a.click();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderAll();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(() => {
    console.log('SW registered');
  }).catch(err => console.log('SW failed:', err));
}
</script>
