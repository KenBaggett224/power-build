<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="./manifest.json">
<title>Power Build v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --card: #16161f;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text2: #8888a0;
    --red: #ff3a5c;
    --red-dim: #ff3a5c30;
    --blue: #3a7bff;
    --blue-dim: #3a7bff30;
    --green: #22c55e;
    --green-dim: #22c55e25;
    --orange: #ff8a2b;
    --orange-dim: #ff8a2b30;
    --purple: #a855f7;
    --purple-dim: #a855f730;
    --yellow: #eab308;
    --mon: var(--red);
    --tue: var(--blue);
    --wed: var(--green);
    --thu: var(--orange);
    --fri: var(--purple);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .topbar h1 {
    font-size: 16px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    background: linear-gradient(135deg, var(--red), var(--orange));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .topbar .version { font-size: 10px; color: var(--text2); font-weight: 400; letter-spacing: 0; }

  .user-tabs { display: flex; gap: 6px; }
  .user-tab {
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1.5px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.2s;
  }
  .user-tab.active { background: var(--red); border-color: var(--red); color: #fff; }

  .week-selector {
    display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .week-btn {
    flex-shrink: 0; padding: 10px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
    border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
    cursor: pointer; transition: all 0.2s;
  }
  .week-btn.active { background: var(--bg3); border-color: var(--text); color: var(--text); }

  .day-selector {
    display: flex; gap: 4px; padding: 6px 16px 12px; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .day-btn {
    flex-shrink: 0; padding: 8px 14px; border-radius: 8px;
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text2);
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .day-btn.active { color: #fff; }
  .day-btn[data-day="Monday"].active { background: var(--red-dim); border-color: var(--mon); color: var(--mon); }
  .day-btn[data-day="Tuesday"].active { background: var(--blue-dim); border-color: var(--tue); color: var(--tue); }
  .day-btn[data-day="Wednesday"].active { background: var(--green-dim); border-color: var(--wed); color: var(--wed); }
  .day-btn[data-day="Thursday"].active { background: var(--orange-dim); border-color: var(--thu); color: var(--thu); }
  .day-btn[data-day="Friday"].active { background: var(--purple-dim); border-color: var(--fri); color: var(--fri); }
  .day-btn .done-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    position: absolute; top: 4px; right: 4px; display: none;
  }
  .day-btn.completed .done-dot { display: block; }

  .day-header {
    padding: 14px 16px; margin: 0 16px; border-radius: 10px; margin-bottom: 10px;
  }
  .day-header h2 { font-size: 18px; font-weight: 800; color: #fff; text-transform: uppercase; }
  .day-header p { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; font-weight: 300; }
  .day-header.Monday { background: linear-gradient(135deg, #ff3a5c20, #ff3a5c08); border: 1px solid #ff3a5c40; }
  .day-header.Tuesday { background: linear-gradient(135deg, #3a7bff20, #3a7bff08); border: 1px solid #3a7bff40; }
  .day-header.Wednesday { background: linear-gradient(135deg, #22c55e20, #22c55e08); border: 1px solid #22c55e40; }
  .day-header.Thursday { background: linear-gradient(135deg, #ff8a2b20, #ff8a2b08); border: 1px solid #ff8a2b40; }
  .day-header.Friday { background: linear-gradient(135deg, #a855f720, #a855f708); border: 1px solid #a855f740; }

  .progress-wrap { padding: 0 16px 12px; display: flex; align-items: center; gap: 10px; }
  .progress-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .progress-text { font-size: 12px; font-weight: 700; color: var(--green); min-width: 36px; text-align: right; }

  .exercises { padding: 0 12px 20px; }

  .ex-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s;
  }
  .ex-card.checked { border-color: var(--green); }
  .ex-card.checked .ex-header { opacity: 0.6; }

  .ex-header {
    display: flex; align-items: flex-start; gap: 10px; padding: 14px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .ex-check {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; margin-top: 1px;
  }
  .ex-check.done { background: var(--green); border-color: var(--green); }
  .ex-check.done::after { content: '\u2713'; color: #fff; font-size: 15px; font-weight: 700; }

  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .ex-sets { font-size: 12px; font-weight: 600; color: var(--blue); margin-top: 2px; }

  .ex-toggle {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
    border: none; background: var(--bg3); color: var(--text2);
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
  }
  .ex-toggle.open { transform: rotate(180deg); }

  .ex-details { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .ex-details.show { display: block; }

  .ex-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-top: 10px; }
  .ex-tip { font-size: 11px; color: var(--text2); line-height: 1.5; margin-top: 8px; font-style: italic; }
  .ex-tip b { color: var(--yellow); font-style: normal; }
  .ex-wt { font-size: 11px; line-height: 1.5; margin-top: 4px; font-weight: 600; }
  .ex-wt .ken-wt { color: var(--red); }
  .ex-wt .hayden-wt { color: var(--blue); }
  .ex-last { font-size: 10px; color: var(--green); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .input-row { display: flex; gap: 8px; margin-top: 12px; }
  .input-group { flex: 1; }
  .input-group label {
    display: block; font-size: 10px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .input-group input, .input-group textarea {
    width: 100%; background: var(--bg); border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px; color: var(--text); font-size: 14px;
    font-family: 'JetBrains Mono', monospace; outline: none; transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group textarea:focus { border-color: var(--blue); }
  .input-group input::placeholder, .input-group textarea::placeholder { color: var(--text2); opacity: 0.5; }
  .input-group textarea { resize: none; height: 44px; font-size: 12px; font-family: 'Outfit', sans-serif; }
  .notes-group { margin-top: 8px; }

  .summary-section {
    padding: 16px; margin: 0 12px 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .summary-section h3 {
    font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--bg2); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .log-table { width: 100%; margin-top: 12px; border-collapse: collapse; }
  .log-table th {
    font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase;
    letter-spacing: 0.5px; padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .log-table td {
    font-size: 12px; padding: 7px 6px; border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
  }
  .log-table td:first-child { font-family: 'Outfit', sans-serif; font-weight: 600; }
  .log-table .completed-row td { color: var(--green); }
  .log-table .pending-row td { color: var(--text2); }

  .actions-bar { padding: 12px 16px 32px; display: flex; gap: 8px; }
  .act-btn {
    flex: 1; padding: 14px; border-radius: 10px; font-size: 13px; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--bg2); color: var(--text2);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s;
  }
  .act-btn:active { transform: scale(0.97); }
  .act-btn.danger { border-color: #ff3a5c40; color: var(--red); }

  .spacer { height: 80px; }

  @media (max-width: 380px) {
    .day-btn { padding: 7px 10px; font-size: 11px; }
    .ex-name { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Power Build <span class="version">v2</span></h1>
  <div class="user-tabs">
    <button class="user-tab active" data-user="ken" onclick="switchUser('ken')">Ken</button>
    <button class="user-tab" data-user="hayden" onclick="switchUser('hayden')">Hayden</button>
  </div>
</div>

<div class="week-selector" id="weekSelector"></div>
<div class="day-selector" id="daySelector"></div>
<div id="dayHeaderWrap"></div>
<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0/6</div>
</div>
<div class="exercises" id="exerciseList"></div>
<div id="summaryWrap"></div>
<div class="actions-bar">
  <button class="act-btn" onclick="exportData()">Export Log</button>
  <button class="act-btn danger" onclick="resetCurrentDay()">Reset Day</button>
</div>
<div class="spacer"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CYCLE 2 PROGRAM — Updated from Ken & Hayden's Cycle 1 data
// Weight format: "Ken: X lb | Hayden: Y lb" where different
// ═══════════════════════════════════════════════════════════════
const PROGRAM = {
"Week 1": {
"Monday": { focus: "Chest & Triceps \u2014 Foundation Strength", exercises: [
  {name:"Flat Barbell Bench Press",sets:"4 x 6-8",
   desc:"Lie flat on bench, grip bar slightly wider than shoulder-width. Lower bar to mid-chest, press up explosively to lockout.",
   tip:"Retract your shoulder blades and squeeze them together before you unrack. Feet flat on the floor, slight arch in your lower back. Lower the bar to your nipple line, not your neck or belly. You should feel this in your mid/lower chest and front delts. Common mistake: flaring elbows to 90 degrees — keep them at 45.",
   wtK:"135-145 lb",wtH:"135 lb. If you get all 4x8 clean, bump 5 lb next week"},
  {name:"Incline Dumbbell Press",sets:"3 x 8-10",
   desc:"Set bench to 30-degree incline. Press dumbbells from chest level to full lockout, squeezing at the top.",
   tip:"Set the bench to 30 degrees — not 45, that’s too steep and turns it into a shoulder press. Bring the dumbbells down until your upper arms are parallel to the floor, then press up and slightly inward. You should feel this in your upper chest, just below your collarbone. If you feel it mostly in your shoulders, the bench is too steep.",
   wtK:"50 lb",wtH:"45-50 lb. Last reps should be a fight"},
  {name:"Cable Crossover Flyes",sets:"3 x 12-15",
   desc:"Set cables to high position. Step forward, bring handles together in a hugging arc in front of your chest.",
   tip:"Keep a slight bend in your elbows and lock that angle — your arms should move like you’re hugging a tree. Step one foot forward for balance. Squeeze your chest together at the bottom and hold for one count. You should feel a deep stretch in your outer chest on the way back. If your front delts burn, you’re pressing, not flying.",
   wtK:"22.5 lb per side",wtH:"17.5-20 lb per side. Squeeze > weight"},
  {name:"Close-Grip Bench Press",sets:"3 x 8-10",
   desc:"Same bench setup, grip shoulder-width or slightly narrower. Lower to lower chest, press up.",
   tip:"Grip the bar at shoulder width — closer than that puts your wrists at a bad angle. Keep your elbows tucked tight to your ribs as you lower the bar to your lower chest. You should feel this primarily in your triceps and inner chest. Common mistake: going too narrow on the grip. Shoulder width is plenty.",
   wtK:"70-80 lb",wtH:"70 lb. If you fail at 8, that's the right weight"},
  {name:"Overhead Tricep Cable Extension",sets:"3 x 12-15",
   desc:"Face away from cable, rope attachment overhead. Extend arms forward and up to full lockout.",
   tip:"Face away from the machine and take a step forward to create tension. Keep your elbows pointed forward and locked in position — only your forearms move. You should feel a deep stretch in the back of your arms at the bottom, and a hard squeeze at full extension. If your elbows drift apart, the weight is too heavy.",
   wtK:"55-60 lb",wtH:"50-55 lb"},
  {name:"Explosive Push-Ups",sets:"3 x 8",
   desc:"Standard push-up but push off the ground explosively so your hands leave the floor slightly. Land softly and repeat.",
   tip:"Set up like a normal push-up with hands just outside shoulder width. On the way up, push as hard and fast as possible so your hands leave the floor. Land soft with a slight elbow bend to absorb the impact. You should feel this in your chest, triceps, and core. Focus on speed off the ground, not height.",
   wtK:"Bodyweight. If 8 is easy, slow the negative to 3 seconds.",wtH:"Bodyweight. If 8 is easy, slow the negative to 3 seconds."},
]},
"Tuesday": { focus: "Back & Biceps \u2014 Width & Thickness", exercises: [
  {name:"Barbell Bent-Over Row",sets:"4 x 6-8",
   desc:"Hinge at hips to 45 degrees, pull barbell to lower chest/upper abdomen.",
   tip:"Hinge at your hips until your torso is about 45 degrees to the floor. Keep your back flat — if you see your back rounding in a mirror, the weight is too heavy. Pull the bar to your belly button, not your chest. You should feel this in your mid-back between your shoulder blades and your lats. Squeeze at the top for one count.",
   wtK:"95 lb",wtH:"70-80 lb. Back flat or the weight is too heavy"},
  {name:"Lat Pulldown (Wide Grip)",sets:"3 x 8-10",
   desc:"Grip bar wide, lean back slightly, pull to upper chest. Squeeze shoulder blades at the bottom.",
   tip:"Grip the bar about 1.5x shoulder width. Lean back slightly — about 15 degrees. Pull to your upper chest by driving your elbows DOWN and BACK, not just down. You should feel this on the sides of your back (lats) and between your shoulder blades. Common mistake: pulling with your biceps. Initiate by pulling your shoulder blades down first.",
   wtK:"120 lb",wtH:"100 lb. 2-second negative on every rep"},
  {name:"Seated Cable Row (V-Bar)",sets:"3 x 10-12",
   desc:"Sit upright, pull V-bar handle to lower chest. Let shoulders stretch forward on return.",
   tip:"Sit tall with a slight forward lean to stretch your lats at the start. Pull the handle to your belly button by driving your elbows straight back. Squeeze your shoulder blades together at the end. You should feel this in your mid-back and lower lats. Don’t lean way back — a slight rock is fine, but this isn’t a rowing machine.",
   wtK:"90-100 lb",wtH:"90-100 lb. Squeeze 1 second at chest"},
  {name:"Barbell Curl (Straight Bar)",sets:"3 x 8-10",
   desc:"Stand upright, curl barbell from full extension to shoulder height. Lower under control.",
   tip:"Stand tall, feet shoulder width. Pin your elbows to your sides — they should not move forward or backward during the rep. Curl the bar up using only your biceps, lower under control for 2 seconds. You should feel this in the front of your upper arm, nowhere else. If you’re rocking your body or swinging, the weight is too heavy.",
   wtK:"50 lb. When you get 3x10 clean, move to 55.",wtH:"50 lb. When you get 3x10 clean, move to 55."},
  {name:"Incline Dumbbell Curl",sets:"3 x 10-12",
   desc:"Sit on 45-degree incline, arms hanging straight down. Curl up, supinating wrists at top.",
   tip:"Set the bench to 45 degrees and let your arms hang straight down — this is the starting position. Your elbows should stay pinned at your sides and not drift forward as you curl. You should feel a deep stretch at the bottom in the front of your bicep. If your elbows swing forward, you lose the stretch. Slow negative — 3 seconds down.",
   wtK:"20 lb. Focus on strict form. When form is locked in, move to 25.",wtH:"20 lb. Focus on strict form. When form is locked in, move to 25."},
  {name:"Face Pulls (Cable)",sets:"3 x 15",
   desc:"Set cable at face height with rope. Pull toward face, separating rope ends past ears. Squeeze rear delts.",
   tip:"Set the cable to face height. Use a rope attachment and pull toward your face, separating the rope ends so they pass beside your ears. Your hands should end up beside your temples. You should feel this in your rear delts and the muscles between your shoulder blades. Keep your elbows HIGH — they should stay at or above shoulder level.",
   wtK:"35-40 lb",wtH:"30 lb. Light and controlled"},
]},
"Wednesday": { focus: "Legs & Core \u2014 Power Foundation", exercises: [
  {name:"Barbell Back Squat",sets:"4 x 6-8",
   desc:"Bar on upper traps, feet shoulder-width, sit back and down to parallel or below. Drive up through heels.",
   tip:"Bar sits on your upper traps, not your neck. Feet shoulder width, toes pointed slightly out. Push your hips back and down like sitting in a chair. Your knees should track over your toes — don’t let them cave inward. Go to at least parallel (hip crease at or below knee). You should feel this in your quads, glutes, and core. Brace your abs hard before every rep.",
   wtK:"135 lb",wtH:"115 lb. If 8 reps is easy, go to 155/135 next week"},
  {name:"Romanian Deadlift (Barbell)",sets:"3 x 8-10",
   desc:"Hold barbell at hips, push hips back, legs nearly straight. Lower until deep hamstring stretch.",
   tip:"Start standing with the bar at your hips. Push your hips BACK while keeping a slight bend in your knees. The bar should drag down your thighs and shins — keep it in contact with your body. Lower until you feel a strong stretch in your hamstrings, then drive your hips forward. You should feel this in your hamstrings and glutes, NOT your lower back. If your lower back rounds, you’ve gone too far.",
   wtK:"120 lb",wtH:"100-110 lb. Feel the hamstrings, not the lower back"},
  {name:"Leg Press",sets:"3 x 10-12",
   desc:"Feet shoulder-width on platform. Lower sled to 90 degrees, press back up.",
   tip:"Place your feet shoulder width on the platform. Lower the sled until your knees reach about 90 degrees. Press through your whole foot — don’t let your heels come up. You should feel this in your quads primarily. Higher foot placement = more glutes and hamstrings. Lower foot placement = more quads. Never lock your knees fully at the top.",
   wtK:"225 lb",wtH:"210 lb. You can handle more on the machine"},
  {name:"Walking Lunges (Dumbbells)",sets:"3 x 12 each leg",
   desc:"Hold dumbbells at sides, step forward into lunge, drive through front heel into next lunge.",
   tip:"Take a big step forward and lower until your back knee nearly touches the floor. Your front shin should stay roughly vertical. Push through the heel of your front foot to drive into the next step. You should feel this in your quads and glutes. Keep your torso upright — don’t lean forward. Common mistake: too short of a step, which puts all the stress on your knee.",
   wtK:"15 lb",wtH:"35-40 lb. Back knee kisses the floor"},
  {name:"Hanging Leg Raise",sets:"3 x 12-15",
   desc:"Hang from pull-up bar, raise legs to 90 degrees or higher. Lower without swinging.",
   tip:"Hang from the bar with straight arms. Raise your legs by curling your pelvis UP, not just lifting your legs. The key is tilting your pelvis at the top — that’s what engages your lower abs. You should feel this below your belly button. If you just swing your legs up, you’re using hip flexors. Slow and controlled, no swinging.",
   wtK:"Bodyweight. Add 5 lb dumbbell between feet, or slow the tempo to 3-3.",wtH:"Bodyweight. Add 5 lb dumbbell between feet, or slow the tempo to 3-3."},
  {name:"Box Jumps",sets:"4 x 5",
   desc:"Stand facing a plyo box, quarter squat and explode up, land softly. Step down.",
   tip:"Stand arm’s length from the box. Dip into a quarter squat, swing your arms, and jump. Land with both feet fully on the box, knees soft. Stand up fully at the top, then STEP down — never jump down. You should feel this in your quads and glutes. Land as quietly as possible — noise means wasted energy.",
   wtK:"Bodyweight. 24-28 inch box. Progress height, not reps.",wtH:"Bodyweight. 24-28 inch box. Progress height, not reps."},
]},
"Thursday": { focus: "Shoulders & Arms \u2014 Athletic Upper Body", exercises: [
  {name:"Standing Barbell Overhead Press",sets:"4 x 6-8",
   desc:"Unrack bar at collarbone, press overhead to full lockout. Lower to shoulders under control.",
   tip:"Unrack at collarbone height. Feet hip width, squeeze your glutes and brace your abs. Press the bar straight up — move your face out of the way as it passes, then push your head through at the top. You should feel this in your shoulders and triceps. Common mistake: arching your lower back. If you arch, the weight is too heavy. Keep your ribs down.",
   wtK:"50 lb. Goal this cycle: all 4 sets of 8 reps. Then bump to 55.",wtH:"50 lb. Goal this cycle: all 4 sets of 8 reps. Then bump to 55."},
  {name:"Dumbbell Lateral Raise",sets:"3 x 12-15",
   desc:"Stand with dumbbells at sides. Raise arms to parallel, lower slowly.",
   tip:"Stand with dumbbells at your sides. Lead with your ELBOWS, not your hands — imagine pouring water from a pitcher at the top. Raise to shoulder height, no higher. You should feel this on the side of your shoulder (lateral delt), not your traps. If your traps burn and you’re shrugging the weight up, go lighter. Slight bend in elbows.",
   wtK:"10-12 lb. If 15 reps is easy, move to 12-15 lb.",wtH:"10-12 lb. If 15 reps is easy, move to 12-15 lb."},
  {name:"Face Pulls (Cable)",sets:"3 x 15",
   desc:"Cable at face height with rope. Pull toward face, separate rope past ears.",
   tip:"Set the cable to face height. Use a rope attachment and pull toward your face, separating the rope ends so they pass beside your ears. Your hands should end up beside your temples. You should feel this in your rear delts and the muscles between your shoulder blades. Keep your elbows HIGH — they should stay at or above shoulder level.",
   wtK:"35-40 lb",wtH:"30-35 lb. 2-second squeeze"},
  {name:"EZ-Bar Curl",sets:"3 x 10-12",
   desc:"Grip EZ bar on inner angles. Curl from full extension to contraction. Lower under control.",
   tip:"Grip the EZ bar on the inner angled portions. The angle reduces wrist strain compared to a straight bar. Stand tall, pin your elbows at your sides, and curl to full contraction. You should feel this in the front of your biceps. Lower slowly for 2 seconds. If your elbows drift forward, the weight is too heavy.",
   wtK:"40-50 lb",wtH:"40 lb. Elbows pinned"},
  {name:"Bench Dips",sets:"3 x 10-12",
   desc:"Hands on a bench behind you, feet on the floor (or elevated on another bench). Lower until upper arms are parallel, press back up.",
   tip:"Place your hands on a bench behind you, fingers forward. Lower yourself until your upper arms are parallel to the floor, then press back up. You should feel this in your triceps and front delts. Common mistake: going too deep — stop at parallel to protect your shoulders. Keep your body close to the bench.",
   wtK:"Bodyweight. Start feet on floor. When 12 is easy, elevate feet on a bench.",wtH:"Bodyweight. Start feet on floor. When 12 is easy, elevate feet on a bench."},
  {name:"Plyo Push-Ups",sets:"3 x 8",
   desc:"Push-up but explode off the ground so hands go airborne. Land softly and repeat.",
   tip:"Start in a push-up position. Lower your chest to the floor, then push up as explosively as possible so your hands leave the ground. Land with soft elbows. You should feel this in your chest, triceps, and core. The goal is maximum speed off the floor. Reset your position between each rep if needed.",
   wtK:"Bodyweight. Power and speed.",wtH:"Bodyweight. Power and speed."},
]},
"Friday": { focus: "Athletic Cardio & Conditioning", exercises: [
  {name:"Treadmill Sprint Intervals",sets:"6 x 30s sprint / 60s walk",
   desc:"Set treadmill to 9-11 mph for sprints. Walk at 3.5 mph for recovery. 6 rounds.",
   tip:"Set your sprint speed first, then straddle the belt and step on when ready. Sprint for the prescribed time, then slow the belt to walking pace for recovery. You should feel your legs and lungs burning by round 3-4. Start at a speed you can maintain for ALL rounds — don’t burn out early. If the treadmill feels unsafe at high speeds, do these on a track instead.",
   wtK:"No weight. Start at 9 mph and bump 0.5 each round if you can.",wtH:"No weight. Start at 9 mph and bump 0.5 each round if you can."},
  {name:"Kettlebell Swings",sets:"4 x 20",
   desc:"Hinge at hips, swing KB between legs, snap hips forward to chest height.",
   tip:"Stand with feet slightly wider than hip width. Hinge at your hips and swing the KB between your legs, then SNAP your hips forward to drive it to chest height. You should feel this in your glutes and hamstrings, not your arms or lower back. Your arms are just along for the ride. Common mistake: squatting instead of hinging. Push your butt BACK, don’t sit DOWN.",
   wtK:"45 lb",wtH:"30-35 lb"},
  {name:"Battle Ropes \u2014 Alternating Waves",sets:"4 x 30s on / 30s off",
   desc:"One rope end per hand. Alternate slamming each arm to create waves to the anchor.",
   tip:"Grip one end of the rope in each hand. Get into an athletic stance — knees bent, hips back. Alternate slamming each arm up and down to create waves that travel to the anchor. You should feel this in your shoulders, arms, and core. Stay LOW in your stance. The power comes from your entire body, not just your arms. Breathe rhythmically — don’t hold your breath.",
   wtK:"Whatever ropes are available. Stay low, stay tight.",wtH:"Whatever ropes are available. Stay low, stay tight."},
  {name:"Farmer\u2019s Walk",sets:"4 x 60 yards",
   desc:"Grab heavy dumbbells, walk with tall posture for 60 yards.",
   tip:"Grab the heaviest dumbbells you can hold. Stand tall with your shoulders back and down. Walk with controlled, even steps for the prescribed distance. You should feel this in your grip, traps, core, and legs. Keep your shoulders packed down — don’t let the weight shrug them up. If your grip fails before your body, use chalk or straps.",
   wtK:"55-65 lb per hand",wtH:"50-55 lb per hand. Go heavy"},
]},
},
"Week 2": {
"Monday": { focus: "Chest & Triceps \u2014 Dumbbell Dominant", exercises: [
  {name:"Flat Dumbbell Press",sets:"4 x 8-10",
   desc:"Lie flat with dumbbell in each hand. Press from chest to full lockout.",
   tip:"Lie flat with dumbbells at chest height. Press up until arms are extended, bringing the dumbbells slightly together at the top. Lower until your upper arms are parallel to the floor or slightly below. You should feel a deeper chest stretch than barbell bench because dumbbells allow a greater range of motion. Keep shoulder blades pinched together the entire time.",
   wtK:"50-55 lb",wtH:"50 lb"},
  {name:"Decline Barbell Press",sets:"3 x 8-10",
   desc:"Slight decline bench. Lower to lower chest, press up.",
   tip:"Set the bench to a slight decline (15-20 degrees). The bar path goes to your lower chest. You should feel this in your lower chest and triceps. Use a spotter or safety pins — being declined with heavy weight and no safety is dangerous. Keep your shoulder blades retracted and your core tight.",
   wtK:"125-135 lb",wtH:"115 lb"},
  {name:"Machine Pec Deck Fly",sets:"3 x 12-15",
   desc:"Forearms against pads. Bring pads together, squeeze, return.",
   tip:"Adjust the seat so your hands and forearms are at chest height. Bring the pads together by squeezing your chest, not pushing with your arms. Hold the squeeze for 2 seconds at the peak. You should feel this across your entire chest. Don’t let the pads go too far back on the return — stop when you feel a comfortable stretch, not pain in your shoulders.",
   wtK:"120-130 lb",wtH:"110 lb. 2-second squeeze"},
  {name:"Tricep Rope Pushdown",sets:"3 x 12-15",
   desc:"Rope on high cable. Push down, spread rope apart at bottom.",
   tip:"Face the cable machine, grab the rope with both hands. Pin your elbows at your sides and push straight down, splitting the rope apart at the bottom. You should feel this in the back of your arms (triceps), especially the outer head. Only your forearms move — your upper arms stay locked. Don’t lean over the weight.",
   wtK:"40 lb",wtH:"30-35 lb. Split the rope hard at the bottom"},
  {name:"Skull Crushers (EZ Bar)",sets:"3 x 10-12",
   desc:"Lie flat, EZ bar above chest. Bend elbows to lower toward forehead, extend back up.",
   tip:"Lie flat, hold the EZ bar with arms extended above your chest. Bend ONLY at the elbows to lower the bar toward your forehead or just past it. Keep your elbows pointed straight up at the ceiling. You should feel this in the long head of your tricep. Common mistake: elbows flaring out. Keep them narrow.",
   wtK:"50 lb",wtH:"45-50 lb. Lower to forehead, not nose"},
  {name:"Explosive Push-Ups",sets:"3 x 8",
   desc:"Push-up but explode so hands leave the ground. Land softly. No clap required.",
   tip:"Set up like a normal push-up with hands just outside shoulder width. On the way up, push as hard and fast as possible so your hands leave the floor. Land soft with a slight elbow bend to absorb the impact. You should feel this in your chest, triceps, and core. Focus on speed off the ground, not height.",
   wtK:"Bodyweight. Max height off the ground.",wtH:"Bodyweight. Max height off the ground."},
]},
"Tuesday": { focus: "Back & Biceps \u2014 Pull-Up Focused", exercises: [
  {name:"Pull-Ups (Bodyweight)",sets:"4 x max reps",
   desc:"Overhand grip, dead hang, pull chin over bar. Lower fully.",
   tip:"Hang from the bar with a full dead hang — arms completely straight. Initiate the pull by pulling your shoulder blades DOWN and BACK, then drive your elbows down to your sides. Pull until your chin clears the bar. You should feel this in your lats, rhomboids, and biceps. No kipping or swinging — every rep from a dead hang.",
   wtK:"Bodyweight. Goal: total 24+ reps across 4 sets. Use assisted machine for last 1-2 sets if needed.",wtH:"Bodyweight. Goal: total 24+ reps across 4 sets. Use assisted machine for last 1-2 sets if needed."},
  {name:"T-Bar Row",sets:"3 x 8-10",
   desc:"Straddle T-bar station. Pull handle to chest, squeeze back at top.",
   tip:"Straddle the T-bar with feet wide. Hinge at the hips, keep your back flat, and pull the handle to your chest. You should feel this in your mid-back and lats. Let the weight stretch at the bottom for a full range of motion. Drive your elbows past your torso at the top. If your back rounds, the weight is too heavy.",
   wtK:"90 lb",wtH:"70-80 lb"},
  {name:"Single-Arm Dumbbell Row",sets:"3 x 10-12 each",
   desc:"One knee and hand on bench. Row dumbbell to your hip. Switch sides.",
   tip:"One knee and one hand on the bench for support. Let the dumbbell hang straight down, then row it to your HIP, not your chest. You should feel this in your lower lat and mid-back on the working side. A slight torso rotation at the top is fine. Let the weight fully stretch at the bottom.",
   wtK:"50 lb",wtH:"45 lb"},
  {name:"Hammer Curls",sets:"3 x 10-12",
   desc:"Dumbbells at sides, palms facing body. Curl up keeping palms inward.",
   tip:"Stand with dumbbells at your sides, palms facing your body. Keep your palms facing inward throughout the entire curl. You should feel this in the brachialis (the muscle between your bicep and tricep) and your forearms. This is what makes your arms look thick from the side. No swinging — strict form.",
   wtK:"35 lb",wtH:"35 lb. No swinging"},
  {name:"Preacher Curl",sets:"3 x 10-12",
   desc:"Upper arms on preacher pad. Curl up and lower to near-full extension.",
   tip:"Rest your upper arms flat on the preacher pad. The pad eliminates all cheating — your bicep does 100% of the work. Curl up and squeeze, lower to near-full extension. You should feel a strong contraction at the top and a stretch at the bottom. Don’t go fully straight at the bottom — keep a tiny bend to protect your tendons.",
   wtK:"80 lb. If 12 becomes easy, move to 85.",wtH:"80 lb. If 12 becomes easy, move to 85."},
  {name:"Med Ball Slams",sets:"3 x 12",
   desc:"Med ball overhead, slam into ground as hard as possible. Catch bounce, repeat.",
   tip:"Hold the ball overhead with both hands, rise up on your toes. Slam it into the ground as hard as you can using your lats, core, and arms. You should feel this in your lats, shoulders, and abs. Catch the bounce and repeat. Common mistake: just using your arms. Engage your whole body — rise up on your toes and slam through the floor.",
   wtK:"20 lb slam ball.",wtH:"20 lb slam ball."},
]},
"Wednesday": { focus: "Legs & Core \u2014 Unilateral Focus", exercises: [
  {name:"Front Squat",sets:"4 x 6-8",
   desc:"Bar in front rack across front delts. Squat to parallel, elbows high, torso upright.",
   tip:"Bar rests across your front delts in a front rack position. You can use a clean grip or cross-arm grip. Keep your elbows HIGH and your torso very upright. You should feel this primarily in your quads and core. Common mistake: elbows dropping, which causes the bar to roll forward. If your wrists hurt with a clean grip, use the cross-arm grip.",
   wtK:"115 lb",wtH:"100 lb"},
  {name:"Bulgarian Split Squat",sets:"3 x 10 each leg",
   desc:"Rear foot on bench behind you. Lower into deep single-leg squat, drive through front heel.",
   tip:"Rear foot elevated on a bench behind you, laces down. Lower into a single-leg squat on the front leg. Your front shin should stay roughly vertical. You should feel this in the quad and glute of the front leg. This exercise exposes left-right imbalances. If you’re wobbling, your stance is too narrow — widen it laterally.",
   wtK:"20 lb dumbbells. When all 3x10 per leg is clean, move to 25.",wtH:"20 lb dumbbells. When all 3x10 per leg is clean, move to 25."},
  {name:"Leg Curl (Machine)",sets:"3 x 12-15",
   desc:"Lie face down. Curl weight up, lower under control.",
   tip:"Lie face down and adjust the pad to sit on your lower calf, just above your ankle. Curl the weight up by bending your knees and squeeze at the top for one second. You should feel this in your hamstrings. Point your toes away from you (plantar flexion) to better isolate the hamstrings. Don’t let the weight slam at the bottom.",
   wtK:"100 lb",wtH:"95 lb. Don't let the stack slam"},
  {name:"Goblet Squat",sets:"3 x 12",
   desc:"Hold heavy dumbbell at chest. Squat deep \u2014 elbows between knees.",
   tip:"Hold the dumbbell or kettlebell at your chest, elbows pointing down. Squat deep — push your knees out with your elbows at the bottom. You should feel this in your quads and glutes. This is one of the safest deep squats because the weight counterbalances you. Great for hip mobility. Go deeper than you think you can.",
   wtK:"35-40 lb. Deep as you can go.",wtH:"35-40 lb. Deep as you can go."},
  {name:"Ab Wheel Rollout",sets:"3 x 10-12",
   desc:"Kneel, grip ab wheel. Roll forward until nearly extended, pull back with abs.",
   tip:"Kneel on the floor, grip the ab wheel. Brace your abs hard and roll forward slowly, extending your body. Only go as far as you can WITHOUT your lower back sagging. You should feel this in your entire core — abs, obliques, and hip flexors. Pull back by crunching your abs, not pulling with your arms. Squeeze your glutes throughout.",
   wtK:"Bodyweight. 3-second tempo each direction.",wtH:"Bodyweight. 3-second tempo each direction."},
  {name:"Vertical Jump for Max Height",sets:"4 x 5",
   desc:"Stand, dip into quarter squat, explode straight up reaching as high as possible. Land softly, reset.",
   tip:"Stand with feet hip width. Dip into a quick quarter squat, swing your arms back, then explode upward reaching as high as possible. Land on the balls of your feet with soft knees. You should feel this in your quads, glutes, and calves. Full arm swing — your arms generate 10-15% of your jump height. Reset completely between reps.",
   wtK:"Bodyweight. Maximum height each rep.",wtH:"Bodyweight. Maximum height each rep."},
]},
"Thursday": { focus: "Shoulders & Arms \u2014 Volume Day", exercises: [
  {name:"Seated Dumbbell Shoulder Press",sets:"4 x 8-10",
   desc:"Sit on upright bench, press dumbbells from shoulder height overhead.",
   tip:"Sit on an upright bench with back support. Start with dumbbells at shoulder height, palms forward. Press straight up until arms are fully extended. You should feel this in your front and lateral delts and triceps. Don’t arch your back — keep your core braced and ribs down. If you have to arch to finish a rep, the weight is too heavy.",
   wtK:"35 lb. When you get all 4x10 at 35, move to 40 and own it.",wtH:"35 lb. When you get all 4x10 at 35, move to 40 and own it."},
  {name:"Cable Lateral Raise",sets:"3 x 12-15 each arm",
   desc:"Stand sideways to low cable. Raise arm to shoulder height, lower slowly.",
   tip:"Stand sideways to a low cable. Reach across your body and grab the handle with the far hand. Raise your arm out to the side until it’s parallel with the floor. You should feel this on the side of your shoulder (lateral delt). The cable provides constant tension even at the bottom where dumbbells go slack. Control the negative.",
   wtK:"10-12 lb. Slight elbow bend.",wtH:"10-12 lb. Slight elbow bend."},
  {name:"Reverse Pec Deck (Rear Delt)",sets:"3 x 12-15",
   desc:"Sit facing pec deck. Reverse-fly pads back, squeezing rear delts.",
   tip:"Sit facing the machine with your chest against the pad. Grab the handles and fly them back by squeezing your rear delts. You should feel this in the back of your shoulders and between your shoulder blades. Lead with your elbows, not your hands. Hold the back position for one second. If your traps take over, go lighter.",
   wtK:"85-90 lb",wtH:"70-75 lb. Lead with elbows"},
  {name:"Alternating Dumbbell Curl",sets:"3 x 10 each arm",
   desc:"Curl one arm while other stays at side. Supinate as you curl up.",
   tip:"Stand tall with dumbbells at your sides. Curl one arm at a time, rotating your palm toward the ceiling (supinating) as you curl up. You should feel the peak contraction in your bicep at the top. Don’t lean back or rock your body. The non-working arm stays still at your side, not swinging for momentum.",
   wtK:"30 lb",wtH:"30-35 lb. Rotate pinky toward ceiling"},
  {name:"Overhead Dumbbell Tricep Extension",sets:"3 x 10-12",
   desc:"One heavy dumbbell with both hands behind head. Extend overhead, lower behind head.",
   tip:"Hold one heavy dumbbell with both hands behind your head. Your elbows should point straight up at the ceiling. Extend the weight overhead by straightening your arms, then lower back behind your head. You should feel a deep stretch in the back of your arms at the bottom. Keep your elbows close to your head — they tend to flare.",
   wtK:"40 lb. Control the stretch at the bottom.",wtH:"40 lb. Control the stretch at the bottom."},
  {name:"Vertical Jumps",sets:"3 x 6",
   desc:"Max effort vertical jump. Full arm swing, explode up, land softly. Reset between each rep.",
   tip:"Stand with feet hip width. Dip into a quick quarter squat, swing your arms, and explode straight up. Reach as high as you can. Land softly on the balls of your feet. You should feel this in your quads, glutes, and calves. Mark a spot on the wall and try to beat it. Full arm swing and full hip extension at the top.",
   wtK:"Bodyweight. Full reset between jumps.",wtH:"Bodyweight. Full reset between jumps."},
]},
"Friday": { focus: "Athletic Cardio & Conditioning", exercises: [
  {name:"Rowing Machine Intervals",sets:"6 x 250m, 60s rest",
   desc:"Row 250m at high effort, rest 60 seconds. 6 rounds.",
   tip:"Strap your feet in, grab the handle. The stroke sequence is LEGS-BACK-ARMS on the pull, and ARMS-BACK-LEGS on the return. You should feel this in your legs, back, and arms in that order. Most people pull with their arms first — that’s wrong. The power comes from your leg drive. Keep your back straight, don’t round over.",
   wtK:"Bodyweight. Aim for consistent split times across all 6.",wtH:"Bodyweight. Aim for consistent split times across all 6."},
  {name:"Dumbbell Thrusters",sets:"4 x 10",
   desc:"Dumbbells at shoulders, squat, and as you stand press overhead in one fluid motion.",
   tip:"Hold dumbbells at shoulder height. Squat down until thighs are parallel, then stand and use the momentum to press the dumbbells overhead in one seamless motion. You should feel this everywhere — quads, glutes, shoulders, triceps, core. The squat-to-press should be one fluid movement, not a squat then a press. Keep your core braced throughout.",
   wtK:"30-35 lb",wtH:"25-30 lb"},
  {name:"Box Jumps with Step Down",sets:"4 x 8",
   desc:"Explode onto box, land softly, step down and reset.",
   tip:"Same as regular box jumps but higher rep count. Jump onto the box, land softly, stand up fully, then step down and reset. You should feel this in your quads, glutes, and calves. Always step down — never jump down. Jumping down puts massive stress on your Achilles tendons and knees. Reset your stance before each jump.",
   wtK:"Bodyweight. 20-24 inch box.",wtH:"Bodyweight. 20-24 inch box."},
  {name:"Farmer\u2019s Walk",sets:"4 x 60 yards",
   desc:"Heaviest dumbbells you can carry. Walk tall for 60 yards.",
   tip:"Grab the heaviest dumbbells you can hold. Stand tall with your shoulders back and down. Walk with controlled, even steps for the prescribed distance. You should feel this in your grip, traps, core, and legs. Keep your shoulders packed down — don’t let the weight shrug them up. If your grip fails before your body, use chalk or straps.",
   wtK:"55-65 lb per hand",wtH:"45-55 lb per hand"},
]},
},
"Week 3": {
"Monday": { focus: "Chest & Triceps \u2014 Incline Priority", exercises: [
  {name:"Incline Barbell Press",sets:"4 x 6-8",
   desc:"Bench at 30 degrees. Unrack bar, lower to upper chest, press to lockout.",
   tip:"Set the bench to 30 degrees — not steeper. Same setup as flat bench: feet planted, shoulder blades pinched, slight arch. Lower the bar to your upper chest, just below your collarbone. You should feel this in your upper chest. If you mostly feel it in your shoulders, the bench angle is too steep. You’ll use about 80% of your flat bench weight.",
   wtK:"115-120 lb",wtH:"105-115 lb"},
  {name:"Flat Dumbbell Fly",sets:"3 x 10-12",
   desc:"Lie flat, dumbbells above chest. Open arms in wide arc, bring back together.",
   tip:"Lie flat, start with dumbbells above your chest. Open your arms in a wide arc with a slight bend in your elbows. Lower until you feel a stretch in your outer chest, then squeeze them back together. You should feel a stretching sensation across your chest. This is an ARC, not a press — your elbow angle stays the same throughout. Don’t go below shoulder level.",
   wtK:"30 lb. If form breaks, drop to 25.",wtH:"30 lb. If form breaks, drop to 25."},
  {name:"Bench Dips (Feet Elevated)",sets:"3 x 10-12",
   desc:"Hands on bench behind you, feet elevated on another bench. Lower until upper arms parallel, press up.",
   tip:"Hands on a bench behind you, feet elevated on another bench in front. Lower until upper arms are parallel, press up. This is harder than feet-on-floor because more weight shifts to your arms. You should feel this intensely in your triceps. Keep your hips close to the bench — don’t drift forward.",
   wtK:"Bodyweight. Start feet on floor if needed. Elevate feet when you can do 3x12 on floor.",wtH:"Bodyweight. Start feet on floor if needed. Elevate feet when you can do 3x12 on floor."},
  {name:"Diamond Push-Ups",sets:"3 x 12-15",
   desc:"Hands close forming diamond. Lower chest to hands, press up.",
   tip:"Place your hands close together under your chest, forming a diamond shape with your thumbs and index fingers. Lower your chest to your hands, elbows tracking alongside your body. You should feel this primarily in your triceps and inner chest. Keep your core tight so your hips don’t sag. If your wrists hurt, widen your hand position slightly.",
   wtK:"Bodyweight. Elevate feet on bench to make harder.",wtH:"Bodyweight. Elevate feet on bench to make harder."},
  {name:"Tricep Kickbacks (Cable)",sets:"3 x 12-15 each arm",
   desc:"Hinge forward, pin elbow at side. Extend forearm until arm is straight. Squeeze.",
   tip:"Hinge forward at your hips. Pin your elbow to your side so your upper arm is parallel to the floor. Extend your forearm behind you until your arm is completely straight. You should feel this in the back of your arm. Hold the lockout for one full second. Your upper arm should NOT move during the rep — only your forearm extends.",
   wtK:"20 lb",wtH:"17.5 lb. Upper arm doesn't move"},
  {name:"Push-Up Burnout (AMRAP)",sets:"3 sets, max reps",
   desc:"Standard push-ups \u2014 as many reps as possible each set. Rest 60 seconds between sets.",
   tip:"Standard push-up form: hands just outside shoulder width, body in a straight line from head to heels. Lower until your chest nearly touches the floor, press back up. You should feel this in your chest, triceps, and core. Go to complete failure on each set — when you can’t do another clean rep, the set is over. Count your total.",
   wtK:"Bodyweight. Track your total across 3 sets and beat it next week.",wtH:"Bodyweight. Track your total across 3 sets and beat it next week."},
]},
"Tuesday": { focus: "Back & Biceps \u2014 Deadlift Day", exercises: [
  {name:"Conventional Deadlift",sets:"4 x 5",
   desc:"Feet hip-width, grip bar outside shins. Drive through floor, keep bar close, lock out.",
   tip:"Stand with feet hip width, bar over your mid-foot. Grip just outside your shins. Chest up, back flat, hips higher than your knees. Push the FLOOR AWAY with your legs — don’t think about pulling the bar up. You should feel this in your hamstrings, glutes, and entire back. The bar should drag up your shins. Keep your neck neutral — don’t look up.",
   wtK:"185 lb. When 4x5 feels smooth, try 195-205.",wtH:"185 lb. When 4x5 feels smooth, try 195-205."},
  {name:"Chest-Supported Row (Incline DB)",sets:"3 x 10-12",
   desc:"Face-down on incline bench. Row both dumbbells to ribs, squeeze back.",
   tip:"Lie face-down on an incline bench set to about 30-45 degrees. Let the dumbbells hang straight down. Row both to your lower ribs by driving your elbows back. You should feel this between your shoulder blades and in your lats. The chest support removes all momentum cheating — your back does 100% of the work. Squeeze for one second at the top.",
   wtK:"45 lb",wtH:"40-45 lb. Squeeze 1 second at ribs"},
  {name:"Straight-Arm Pulldown (Cable)",sets:"3 x 12-15",
   desc:"High cable, straight bar. Arms straight, pull bar to thighs in an arc.",
   tip:"Stand facing a high cable with a straight bar or rope. Keep your arms completely straight — elbows locked. Pull the bar down to your thighs in an arc using only your lats. You should feel this on the sides of your back (lats) with zero bicep involvement. Lean forward slightly and push your chest out. Common mistake: bending your elbows, which turns it into a pulldown.",
   wtK:"50-55 lb. Mind-muscle connection is everything.",wtH:"50-55 lb. Mind-muscle connection is everything."},
  {name:"Concentration Curl",sets:"3 x 12 each arm",
   desc:"Sit on bench, brace elbow against inner thigh. Curl from full extension to contraction.",
   tip:"Sit on the edge of a bench with your legs spread. Brace the back of your working arm against your inner thigh. Curl the dumbbell from full extension to full contraction. You should feel a peak contraction in your bicep at the top. The braced position makes cheating physically impossible. Supinate hard at the top and squeeze for two seconds.",
   wtK:"30 lb. 2 seconds up, 2 seconds down.",wtH:"30 lb. 2 seconds up, 2 seconds down."},
  {name:"Reverse Grip Barbell Curl",sets:"3 x 12",
   desc:"Overhand grip (palms down), curl up keeping wrists straight.",
   tip:"Hold the barbell with an overhand grip (palms facing down). Curl up keeping your wrists straight. You should feel this in your forearms and the brachioradialis (the muscle on top of your forearm). These are much harder than regular curls — your grip will fail before your biceps. Keep the weight lighter and control every rep.",
   wtK:"50 lb",wtH:"40 lb"},
  {name:"Dumbbell Plank Row",sets:"3 x 8 each arm",
   desc:"Push-up position on dumbbells. Row one to hip while bracing on the other. Alternate.",
   tip:"Get in a push-up position with each hand on a dumbbell. Row one dumbbell to your hip while bracing your entire core on the other arm. You should feel this in your lats and core simultaneously. Widen your feet for better stability. The key is keeping your hips completely square to the floor — don’t rotate. If you’re twisting, go lighter.",
   wtK:"30 lb",wtH:"20-25 lb. Stability is the challenge"},
]},
"Wednesday": { focus: "Legs & Core \u2014 Explosive Power", exercises: [
  {name:"Trap Bar Deadlift",sets:"4 x 6-8",
   desc:"Stand inside trap bar. Grip handles, drive through floor to stand. Lower under control.",
   tip:"Stand inside the trap bar, feet hip width. Grab the handles, drop your hips slightly below your shoulders, chest up. Drive through the floor to stand up. You should feel this in your quads, glutes, hamstrings, and traps. The neutral grip and centered load make this more athletic and easier on your back than conventional deadlifts. Great for building jump power.",
   wtK:"225 lb",wtH:"205 lb"},
  {name:"Step-Ups (Dumbbell)",sets:"3 x 10 each leg",
   desc:"Face bench (knee height). Step up, drive through heel to stand on top. Step down.",
   tip:"Stand facing a bench that’s about knee height. Step one foot fully onto the bench and drive through that heel to stand on top. You should feel this in the quad and glute of the working leg. The key: don’t push off your back foot. All the drive should come from the leg on the bench. Keep your torso upright. Step down with control.",
   wtK:"45-50 lb",wtH:"40-45 lb. All drive from the working leg"},
  {name:"Leg Extension (Machine)",sets:"3 x 12-15",
   desc:"Extend legs fully, squeeze quads at top, lower slowly.",
   tip:"Sit in the machine with the pad on your lower shins. Extend your legs until fully straight and squeeze your quads hard at the top for two seconds. You should feel this on the front of your thighs. Lower slowly — don’t let gravity do the work. Point your toes slightly outward to target the VMO (teardrop muscle on your inner quad).",
   wtK:"115 lb",wtH:"110 lb"},
  {name:"Dumbbell Glute Bridge",sets:"3 x 15",
   desc:"Lie on floor, feet flat, heavy dumbbell on hips. Drive hips up, squeeze glutes hard at top. Lower slowly.",
   tip:"Lie on your back, feet flat on the floor, knees bent. Place a heavy dumbbell across your hip crease. Drive through your heels and squeeze your glutes to lift your hips. You should feel this in your glutes, not your lower back. At the top, your body should form a straight line from knees to shoulders. Hold the squeeze for two seconds. Don’t hyperextend your back.",
   wtK:"50-60 lb dumbbell",wtH:"40-50 lb. Squeeze glutes 2 seconds at top"},
  {name:"Pallof Press (Cable)",sets:"3 x 12 each side",
   desc:"Stand sideways to cable at chest height. Press handle out, hold 2 seconds, return.",

// ═══════════════════════════════════════════════════════════════
// STATE & STORAGE (v2 prefix to not conflict with old data)
// ═══════════════════════════════════════════════════════════════
let currentUser = 'ken';
let currentWeek = 'Week 1';
let currentDay = 'Monday';

function storageKey(user, week, day, exIdx, field) {
  return `apb2_${user}_${week}_${day}_${exIdx}_${field}`;
}
function getData(exIdx, field) {
  return localStorage.getItem(storageKey(currentUser, currentWeek, currentDay, exIdx, field)) || '';
}
function setData(exIdx, field, value) {
  const key = storageKey(currentUser, currentWeek, currentDay, exIdx, field);
  if (value) localStorage.setItem(key, value); else localStorage.removeItem(key);
}
function isExDone(user, week, day, exIdx) {
  return localStorage.getItem(storageKey(user, week, day, exIdx, 'done')) === '1';
}
function isDayCompleted(user, week, day) {
  const exs = PROGRAM[week]?.[day]?.exercises;
  if (!exs) return false;
  return exs.every((_, i) => isExDone(user, week, day, i));
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function switchUser(user) {
  currentUser = user;
  document.querySelectorAll('.user-tab').forEach(t => t.classList.toggle('active', t.dataset.user === user));
  renderAll();
}
function selectWeek(week) { currentWeek = week; currentDay = 'Monday'; renderAll(); }
function selectDay(day) { currentDay = day; renderDayContent(); }
function renderAll() { renderWeekSelector(); renderDaySelector(); renderDayContent(); }

function renderWeekSelector() {
  const el = document.getElementById('weekSelector');
  el.innerHTML = '';
  ['Week 1','Week 2','Week 3','Week 4'].forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (w === currentWeek ? ' active' : '');
    btn.textContent = w.toUpperCase();
    btn.onclick = () => selectWeek(w);
    el.appendChild(btn);
  });
}

function renderDaySelector() {
  const el = document.getElementById('daySelector');
  el.innerHTML = '';
  ['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (d === currentDay ? ' active' : '');
    btn.dataset.day = d;
    if (isDayCompleted(currentUser, currentWeek, d)) btn.classList.add('completed');
    const dot = document.createElement('span'); dot.className = 'done-dot'; btn.appendChild(dot);
    const labels = {Monday:'MON',Tuesday:'TUE',Wednesday:'WED',Thursday:'THU',Friday:'FRI'};
    btn.appendChild(document.createTextNode(labels[d]));
    btn.onclick = () => selectDay(d);
    el.appendChild(btn);
  });
}

function renderDayContent() {
  const dayData = PROGRAM[currentWeek]?.[currentDay];
  if (!dayData) return;
  document.getElementById('dayHeaderWrap').innerHTML = `<div class="day-header ${currentDay}"><h2>${currentDay}</h2><p>${dayData.focus}</p></div>`;
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';

  dayData.exercises.forEach((ex, i) => {
    const done = getData(i, 'done') === '1';
    const card = document.createElement('div');
    card.className = 'ex-card' + (done ? ' checked' : '');
    card.id = `ex-card-${i}`;
    card.innerHTML = `
      <div class="ex-header" onclick="toggleDetails(${i})">
        <div class="ex-check ${done?'done':''}" id="check-${i}" onclick="event.stopPropagation();toggleDone(${i})"></div>
        <div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-sets">${ex.sets}</div></div>
        <button class="ex-toggle" id="toggle-${i}">\u25BC</button>
      </div>
      <div class="ex-details" id="details-${i}">
        <div class="ex-desc">${ex.desc}</div>
        <div class="ex-tip"><b>Pro Tip:</b> ${ex.tip}</div>
        <div class="ex-wt"><span class="${currentUser==='ken'?'ken-wt':'hayden-wt'}">Target: ${currentUser==='ken'?ex.wtK:ex.wtH}</span></div>
        <div class="input-row">
          <div class="input-group"><label>Weight Used</label>
            <input type="text" inputmode="numeric" placeholder="lbs" id="wt-${i}" value="${getData(i,'weight')}" onchange="setData(${i},'weight',this.value)"></div>
          <div class="input-group"><label>Reps Done</label>
            <input type="text" inputmode="text" placeholder="e.g. 8,8,7,6" id="reps-${i}" value="${getData(i,'reps')}" onchange="setData(${i},'reps',this.value)"></div>
        </div>
        <div class="input-group notes-group"><label>Notes</label>
          <textarea placeholder="How'd it feel?" id="notes-${i}" onchange="setData(${i},'notes',this.value)">${getData(i,'notes')}</textarea></div>
      </div>`;
    list.appendChild(card);
  });
  updateProgress(); renderSummary(); renderDaySelector();
}

function toggleDone(idx) {
  setData(idx, 'done', getData(idx,'done')==='1' ? '' : '1');
  const done = getData(idx,'done')==='1';
  document.getElementById(`check-${idx}`).classList.toggle('done', done);
  document.getElementById(`ex-card-${idx}`).classList.toggle('checked', done);
  updateProgress(); renderSummary(); renderDaySelector();
}
function toggleDetails(idx) {
  document.getElementById(`details-${idx}`).classList.toggle('show');
  document.getElementById(`toggle-${idx}`).classList.toggle('open');
}
function updateProgress() {
  const exs = PROGRAM[currentWeek]?.[currentDay]?.exercises || [];
  let done = 0; exs.forEach((_,i)=>{ if(getData(i,'done')==='1') done++; });
  const pct = exs.length ? Math.round(done/exs.length*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressText').textContent = `${done}/${exs.length}`;
}

function renderSummary() {
  const wrap = document.getElementById('summaryWrap');
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  let totalEx=0, totalDone=0;
  const dayLogs = [];
  days.forEach(d => {
    const exs = PROGRAM[currentWeek]?.[d]?.exercises || [];
    let dayDone = 0;
    exs.forEach((_,i)=>{ totalEx++; if(isExDone(currentUser,currentWeek,d,i)){totalDone++;dayDone++;} });
    dayLogs.push({day:d,total:exs.length,done:dayDone});
  });
  const pct = totalEx ? Math.round(totalDone/totalEx*100) : 0;
  const currentExs = PROGRAM[currentWeek]?.[currentDay]?.exercises || [];
  let logRows = '';
  currentExs.forEach((ex,i) => {
    const done = isExDone(currentUser,currentWeek,currentDay,i);
    const w = localStorage.getItem(storageKey(currentUser,currentWeek,currentDay,i,'weight'))||'\u2014';
    const r = localStorage.getItem(storageKey(currentUser,currentWeek,currentDay,i,'reps'))||'\u2014';
    logRows += `<tr class="${done?'completed-row':'pending-row'}"><td>${ex.name}</td><td>${w}</td><td>${r}</td></tr>`;
  });
  wrap.innerHTML = `<div class="summary-section">
    <h3>${currentUser==='ken'?'Ken':'Hayden'}'s ${currentWeek} Summary</h3>
    <div class="summary-grid">
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${totalDone}</div><div class="stat-label">Exercises Done</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--blue)">${totalEx-totalDone}</div><div class="stat-label">Remaining</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--orange)">${pct}%</div><div class="stat-label">Week Complete</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--purple)">${dayLogs.filter(d=>d.done===d.total).length}/5</div><div class="stat-label">Days Done</div></div>
    </div>
    ${logRows?`<table class="log-table"><tr><th>Exercise</th><th>Weight</th><th>Reps</th></tr>${logRows}</table>`:''}
  </div>`;
}

function resetCurrentDay() {
  if (!confirm(`Reset all ${currentDay} data for ${currentUser==='ken'?'Ken':'Hayden'}?`)) return;
  const exs = PROGRAM[currentWeek]?.[currentDay]?.exercises || [];
  exs.forEach((_,i)=>{ ['done','weight','reps','notes'].forEach(f=>localStorage.removeItem(storageKey(currentUser,currentWeek,currentDay,i,f))); });
  renderDayContent();
}

function exportData() {
  let output = `ATHLETIC POWER BUILDING LOG (CYCLE 2)\n${currentUser==='ken'?'Ken':'Hayden'}\n${'='.repeat(40)}\n\n`;
  ['Week 1','Week 2','Week 3','Week 4'].forEach(w => {
    output += `\n${w.toUpperCase()}\n${'-'.repeat(30)}\n`;
    ['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(d => {
      const exs = PROGRAM[w]?.[d]?.exercises || [];
      let hasData = false;
      let dayStr = `\n  ${d} \u2014 ${PROGRAM[w][d].focus}\n`;
      exs.forEach((ex,i) => {
        const wt=localStorage.getItem(storageKey(currentUser,w,d,i,'weight'));
        const reps=localStorage.getItem(storageKey(currentUser,w,d,i,'reps'));
        const notes=localStorage.getItem(storageKey(currentUser,w,d,i,'notes'));
        const done=localStorage.getItem(storageKey(currentUser,w,d,i,'done'));
        if(wt||reps||notes||done){ hasData=true;
          dayStr+=`    ${done==='1'?'\u2713':'\u25CB'} ${ex.name}: ${wt||'\u2014'} lbs, ${reps||'\u2014'} reps${notes?' | '+notes:''}\n`; }
      });
      if(hasData) output += dayStr;
    });
  });
  const blob = new Blob([output],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = `workout_log_cycle2_${currentUser}.txt`; a.click();
}

// Init
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
renderAll();
</script>
